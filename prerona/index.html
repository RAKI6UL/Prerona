<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Magical Eternity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1f001f 100%);
            color: white;
            overflow-x: hidden;
            margin: 0;
        }

        /* Butterfly & Heart Animations */
        .butterfly-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 99;
        }

        .butterfly {
            position: absolute;
            font-size: 24px;
            pointer-events: none;
            animation: fly linear infinite;
        }

        @keyframes fly {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)); opacity: 0; }
        }

        .heart-float {
            position: fixed;
            bottom: -20px;
            color: rgba(255, 63, 108, 0.4);
            font-size: 20px;
            pointer-events: none;
            animation: floatUp 6s linear infinite;
            z-index: 1;
        }

        @keyframes floatUp {
            to { transform: translateY(-110vh) translateX(50px); opacity: 0; }
        }

        /* White Flash Overlay */
        #welcome-overlay {
            position: fixed; inset: 0; background: white;
            display: none; align-items: center; justify-content: center;
            z-index: 100000; opacity: 0; transition: opacity 0.6s ease;
        }

        .welcome-text {
            font-family: 'Dancing Script', cursive;
            font-size: 5rem; color: #ff3f6c; text-align: center;
            animation: pulseText 1.5s infinite;
        }

        @keyframes pulseText {
            0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); }
        }

        /* Photo Cards */
        .photo-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 20px; border-radius: 30px;
            border: 1px solid rgba(255, 63, 108, 0.2);
            transition: all 0.5s ease;
        }
        .photo-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(255, 63, 108, 0.3); }
        .photo-card img { width: 100%; border-radius: 20px; }

        .poem {
            font-family: 'Playfair Display', serif;
            font-size: 16px; line-height: 1.8; color: #f8e0e8;
            padding: 20px; background: rgba(255, 63, 108, 0.1);
            border-radius: 15px; border-left: 5px solid #ff3f6c;
            display: none; margin-top: 15px;
        }
        .poem.show { display: block; animation: fadeIn 0.8s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Footer */
        #main-footer {
            position: fixed; bottom: 0; width: 100%;
            padding: 15px 30px; background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px); border-top: 2px solid #ff3f6c;
            display: none; justify-content: space-between; align-items: center; z-index: 1000;
        }

        .footer-brand {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem; color: #f0c050;
        }

        #live-clock {
            font-family: 'Courier New', monospace;
            font-size: 1.2rem; font-weight: bold; color: #ffd700;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 12px; border-radius: 10px; border: 1px solid #ffd70044;
        }

        /* Grid Modal */
        .grid-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; align-items: center; justify-content: center; z-index: 10000;
        }
        .grid-item {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 63, 108, 0.3);
            border-radius: 15px; padding: 15px 10px;
            text-align: center; cursor: pointer; transition: all 0.3s ease;
            font-size: 0.9rem; font-weight: 500;
        }
        .grid-item:hover {
            background: rgba(255, 63, 108, 0.4);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="butterfly-container" id="butterfly-layer"></div>

    <div id="entrance" class="fixed inset-0 bg-black flex items-center justify-center z-[9999] cursor-pointer">
        <div class="text-center">
            <div class="flex justify-center gap-10 mb-8">
                <span class="text-9xl animate-bounce">❤️</span>
                <span class="text-9xl animate-bounce" style="animation-delay: 0.2s">❤️</span>
            </div>
            <p class="text-[#f0c050] text-3xl" style="font-family: 'Dancing Script';">Touch to enter our world...</p>
        </div>
    </div>

    <div id="welcome-overlay">
        <h1 class="welcome-text">WELCOME BABY</h1>
    </div>

    <div id="top-bar" class="fixed top-0 left-0 w-full py-4 px-6 bg-black/80 backdrop-blur-md flex justify-between items-center z-50" style="display: none;">
        <button onclick="showGridMenu()" class="bg-gradient-to-r from-pink-500 to-rose-600 px-6 py-2 rounded-full font-bold shadow-lg text-white">📸 Memories</button>
        <button onclick="logout()" class="px-5 py-2 border border-pink-500 rounded-full text-sm">Logout</button>
    </div>

    <div id="content" class="hidden">
        <div class="text-center pt-32 pb-16">
            <h1 class="text-7xl text-[#ff3f6c] mb-2" style="font-family: 'Dancing Script';">Eternal Paradise</h1>
            <p class="text-xl text-[#f0c050]" style="font-family: 'Dancing Script';">প্রজাপতি ডানায় লিখেছি তোমার নাম ❤️</p>
        </div>

        <div class="max-w-3xl mx-auto px-5 space-y-16 pb-40">
            <script>
                const memories = [
                    { title: "শ্বেতশুভ্র স্নিগ্ধতা 💖", poem: "সাদা শাড়ির ওই রঙিন পাড় যেন তোমার চঞ্চল মনেরই এক একটা রঙ। চুলে গোঁজা লাল গোলাপটা কানে কানে বলছে, পৃথিবীর সবটুকু সৌন্দর্য আজ তোমার ওই হাসিতেই আছে।" },
                    { title: "মায়াবী কৃষ্ণকলি 💖", poem: "কালো শাড়ির প্রতিটি ঝিলিক তোমার চোখের মায়ার কাছে হার মানতে বাধ্য। থুতনিতে হাত দিয়ে তোমার ওই গভীর চাহনি যেন এক অব্যক্ত গল্পের শুরু।" },
                    { title: "নীল-ম্যাজেন্টার আলপনা 🌸", poem: "গাঢ় নীল শাড়িতে তোমায় ঠিক নীলপদ্মটির মতোই রহস্যময়ী লাগছে। গলার ওই হারটি যেন তোমার গরিমাকে আরও বাড়িয়ে দিয়েছে। বনপথের নির্জনতায় তোমার এই মিষ্টি হাসিটুকু আমার সারা দিনের ক্লান্তি মুছে দেওয়ার জন্য যথেষ্ট।।" },
                    { title: "এলোকেশী রাজকন্যা 💖", poem: "বাতাসে উড়ন্ত তোমার ওই রেশমি চুলগুলো যেন অবাধ্য কোনো মেঘের দল... আমার হৃদয়ে ঝড় তোলে।" },
                    { title: "জলছবির মতো স্থির 🌹", poem: "বাতাসে উড়ন্ত তোমার ওই রেশমি চুলগুলো যেন অবাধ্য কোনো মেঘের দল, যা বারবার তোমার মুখের চন্দ্রিমাকে ছুঁয়ে যেতে চায়। বিকেলের রোদ্দুর যখন তোমার ললাট স্পর্শ করে, মনে হয় সৃষ্টিকর্তা বুঝি অনেক সময় নিয়ে শুধু তোমার জন্যই এই আলোটুকু সাজিয়েছেন।" },
                    { title: "ক্ল্যাসিক আভিজাত্য 🥰", poem: "সাদা-কালো ফ্রেমে বন্দি এই মুহূর্তটি এক কথায় অপূর্ব। তুমি যখন তোমার কানের দুলটি আলতো করে ধরে আছ, আর তোমার দৃষ্টি দূরে কোথাও স্থির—সেই মুহূর্তটা যেন এক জীবন্ত শিল্পকর্ম। তোমার এই ভঙ্গিমা আর মুখের শান্ত অভিব্যক্তি ছবিটিতে এক গভীর আভিজাত্য এনেছে। সাদাসিধে এই পোজটিতেই তোমার ভেতরের স্নিগ্ধতা আর মায়া চমৎকারভাবে ফুটে উঠেছে, যা যে কাউকে মুগ্ধ করতে বাধ্য।" },
                    { title: "সূর্যমুখীর মায়া 🏡", poem: "হলুদ সূর্যমুখীদের ভিড়ে গোলাপি পোশাকে তুমি যেন এক অন্য জগতের ফুল। যান্ত্রিক এই শহরে প্রকৃতির এই সতেজতাটুকু তোমার উপস্থিতিতে আরও মায়াবী হয়ে উঠেছে। তোমার দিকভ্রান্ত ওই চাউনিটি যেন আমার হৃদয়ে অজানার তৃষ্ণা জাগিয়ে দেয়।" },
                    { title: "নীলাম্বরীর গল্প ✨", poem: "রাতের আঁধারে নীল শাড়ির ওই আভা আর এক কাপ চা—এক টুকরো নিখাদ ভালোবাসার প্রতিচ্ছবি। রিনঝিন চুড়ির শব্দ আর তোমার চোখের ওই দীপ্তি যেন এক নির্ঘুম রাতের স্বপ্ন। তুমি পাশে থাকলেই অন্ধকার রাতগুলোও হয়ে ওঠে আলোয় ঝলমলে।" }
                ];

                memories.forEach((m, i) => {
                    document.write(`
                        <div class="photo-card" id="photo-${i+1}">
                            <img src="pic/${i+1}.jpg" alt="${m.title}">
                            <div class="mt-6 text-center font-semibold text-lg text-pink-300">${m.title}</div>
                            <button onclick="togglePoem(${i+1})" class="w-full mt-4 py-3 rounded-full bg-[#ff3f6c]/20 border border-[#ff3f6c] hover:bg-[#ff3f6c]/40 transition">📖 Open My Heart </button>
                            <div id="poem-${i+1}" class="poem">${m.poem}</div>
                        </div>
                    `);
                });
            </script>
        </div>
    </div>

    <div id="grid-modal" class="grid-modal" onclick="hideGridMenu()">
        <div class="bg-black/95 p-8 rounded-3xl border border-[#ff3f6c] w-11/12 max-w-lg" onclick="event.stopPropagation()">
            <h2 class="text-3xl text-center mb-8 text-[#f0c050]" style="font-family: 'Dancing Script'">Select a Memory</h2>
            <div class="grid grid-cols-2 gap-4" id="nav-grid">
                <script>
                    memories.forEach((m, i) => {
                        document.write(`<div onclick="selectPhoto(${i+1})" class="grid-item">${m.title}</div>`);
                    });
                </script>
            </div>
            <button onclick="hideGridMenu()" class="mt-8 w-full py-3 bg-white/10 rounded-xl text-sm font-bold">Close</button>
        </div>
    </div>

    <footer id="main-footer">
        <div class="footer-brand">Forever Yours ❤️</div>
        <div id="live-clock">00:00:00 AM</div>
    </footer>

    <audio id="titanic-sound" loop preload="auto">
        <source src="https://assets.mixkit.co/music/preview/123/123-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Animations
        function createButterfly() {
            const b = document.createElement('div');
            b.className = 'butterfly'; b.innerHTML = '🦋';
            b.style.left = Math.random() * window.innerWidth + 'px';
            b.style.top = Math.random() * window.innerHeight + 'px';
            b.style.setProperty('--tx', (Math.random() - 0.5) * 400 + 'px');
            b.style.setProperty('--ty', (Math.random() - 0.5) * 400 + 'px');
            b.style.setProperty('--rot', Math.random() * 360 + 'deg');
            b.style.animationDuration = (5 + Math.random() * 10) + 's';
            document.getElementById('butterfly-layer').appendChild(b);
            setTimeout(() => b.remove(), 10000);
        }

        function createHeart() {
            const h = document.createElement('div');
            h.className = 'heart-float'; h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.animationDuration = (4 + Math.random() * 4) + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 8000);
        }

        // Logic
        document.getElementById('entrance').addEventListener('click', () => {
            const music = document.getElementById('titanic-sound');
            const flash = document.getElementById('welcome-overlay');
            
            music.volume = 0.5;
            music.play().catch(() => {});
            
            flash.style.display = 'flex';
            setTimeout(() => flash.style.opacity = '1', 50);

            setTimeout(() => {
                flash.style.opacity = '0';
                document.getElementById('entrance').style.display = 'none';
                document.getElementById('content').classList.remove('hidden');
                document.getElementById('top-bar').style.display = 'flex';
                document.getElementById('main-footer').style.display = 'flex';
                
                setInterval(createButterfly, 700);
                setInterval(createHeart, 1500);
                setTimeout(() => flash.style.display = 'none', 600);
            }, 2500);
        });

        function togglePoem(n) { document.getElementById('poem-'+n).classList.toggle('show'); }
        function showGridMenu() { document.getElementById('grid-modal').style.display = 'flex'; }
        function hideGridMenu() { document.getElementById('grid-modal').style.display = 'none'; }
        function selectPhoto(n) { 
            hideGridMenu(); 
            document.getElementById('photo-'+n).scrollIntoView({ behavior: "smooth", block: "center" }); 
        }
        function logout() { if(confirm("Refresh memory?")) location.reload(); }

        function updateClock() {
            const now = new Date();
            let h = String(now.getHours() % 12 || 12).padStart(2, '0');
            let m = String(now.getMinutes()).padStart(2, '0');
            let s = String(now.getSeconds()).padStart(2, '0');
            let ampm = now.getHours() >= 12 ? 'PM' : 'AM';
            document.getElementById('live-clock').innerText = `${h}:${m}:${s} ${ampm}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
